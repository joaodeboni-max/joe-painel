    const createIcon = (name) => {
      return function LucideIcon(props) {
        const ref = React.useRef(null);
        React.useEffect(() => {
          if (ref.current && lucide.icons[name]) {
            const [tag, attrs, children] = lucide.icons[name];
            const svg = document.createElementNS("http://www.w3.org/2000/svg", "svg");
            Object.entries({...attrs, width: props.size || 24, height: props.size || 24, stroke: props.color || "currentColor", "stroke-width": props.strokeWidth || 2, class: props.className || ""}).forEach(([k,v]) => svg.setAttribute(k,v));
            children.forEach(([ctag, cattrs]) => {
              const el = document.createElementNS("http://www.w3.org/2000/svg", ctag);
              Object.entries(cattrs).forEach(([k,v]) => el.setAttribute(k,v));
              svg.appendChild(el);
            });
            ref.current.innerHTML = "";
            ref.current.appendChild(svg);
          }
        }, [props.size, props.color, props.className]);
        return React.createElement("span", {ref, style: {display: "inline-flex", alignItems: "center", ...props.style}});
      };
    };

function statusDot(s) {
  if (s === "online" || s === "conectado") return "bg-emerald-500";
  if (s === "atencao" || s === "aguardando") return "bg-amber-500";
  return "bg-red-500";
}
function statusLabel(s) {
  const m = { online: "Online", atencao: "Atenção", manual: "Manual", offline: "Offline", conectado: "Conectado", desconectado: "Desconectado", aguardando: "Aguardando" };
  return m[s] || s;
}

  const alerts = integrations.filter(i => i.status === "atencao" || i.status === "offline");

  return (
    <div className="space-y-6 max-w-6xl">
      {/* Metrics */}
      <div className="grid grid-cols-2 md:grid-cols-4 gap-4">
        {[
          { label: "Mensagens hoje", value: totalMsgs, icon: MessageSquare },
          { label: "Agentes ativos", value: `${activeAgents}/10`, icon: Bot },
          { label: "Integrações online", value: `${onlineIntegrations}/${integrations.length}`, icon: Plug },

              <span className="flex-1 truncate text-gray-700">{log.mensagem}</span>

          ))}

    </div>
  );
}

// ─── AGENTE DETAIL ──────────────────────────────────────
function AgenteDetailPage({ agentKey, agent, agents, setAgents, integrations, config, onBack }) {
  const [tab, setTab] = useState("chat");
  const [chatHistory, setChatHistory] = useState([]);
  const [chatInput, setChatInput] = useState("");
  const [loading, setLoading] = useState(false);
  const [editPrompt, setEditPrompt] = useState(agent.prompt);
  const [docs, setDocs] = useState([]);
  const chatEnd = useRef(null);
  const tabList = [
    { key: "chat", label: "Chat" },
    { key: "config", label: "Configurar" },
    { key: "integ", label: "Integrações" },
    { key: "docs", label: "Documentos" }
  ];
  const agentIntegrations = integrations.filter(i => i.agentes.includes(agentKey));

  useEffect(() => { chatEnd.current?.scrollIntoView({ behavior: "smooth" }); }, [chatHistory]);

  async function sendMessage() {
    if (!chatInput.trim() || loading) return;
    const msg = chatInput.trim();
    setChatInput("");
    setChatHistory(h => [...h, { role: "user", content: msg }]);
    setLoading(true);
    try {
      const key = config.anthropicKey;
      if (!key) {
        setChatHistory(h => [...h, { role: "assistant", content: "⚠ Configure a ANTHROPIC_API_KEY nas Configurações para usar o chat." }]);
        setLoading(false);
        return;
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "x-api-key": key, "anthropic-version": "2023-06-01", "content-type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1024,
          system: agent.prompt,
          messages: [...chatHistory.map(m => ({ role: m.role, content: m.content })), { role: "user", content: msg }]
        })
      });
      const data = await res.json();
      const reply = data.content?.[0]?.text || data.error?.message || "Erro ao processar resposta.";
      setChatHistory(h => [...h, { role: "assistant", content: reply }]);
    } catch (e) {
      setChatHistory(h => [...h, { role: "assistant", content: `Erro: ${e.message}` }]);
    }
    setLoading(false);
  }

  function savePrompt() {
    setAgents(prev => ({ ...prev, [agentKey]: { ...prev[agentKey], prompt: editPrompt } }));
  }

  return (
    <div className="max-w-4xl">
      <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-900 mb-4">
        <ArrowLeft size={16} /> Voltar aos agentes
      </button>
      <div className="flex items-center gap-3 mb-5">
        <div className="text-4xl">{agent.icon}</div>
        <div>
          <h2 className="text-xl font-bold">{agent.nome}</h2>
          <span className="text-sm text-gray-500">{agent.area}</span>
        </div>
        <div className={`ml-3 w-2.5 h-2.5 rounded-full ${agent.ativo ? "bg-emerald-500" : "bg-red-400"}`} />
      </div>

      {/* Tabs */}
      <div className="flex gap-1 border-b border-gray-200 mb-5">
        {tabList.map(t => (
          <button key={t.key} onClick={() => setTab(t.key)}
            className={`px-4 py-2 text-sm font-medium border-b-2 transition-colors -mb-px
              ${tab === t.key ? "border-gray-900 text-gray-900" : "border-transparent text-gray-500 hover:text-gray-700"}`}>
            {t.label}
          </button>
        ))}
      </div>

      {/* Chat Tab */}
      {tab === "chat" && (
        <div className="bg-white border border-gray-200 rounded-xl shadow-sm flex flex-col" style={{ height: "500px" }}>
          <div className="flex-1 overflow-y-auto p-4 space-y-3">
            {chatHistory.length === 0 && (
              <div className="text-center text-gray-400 text-sm pt-20">
                Envie uma mensagem para conversar com {agent.nome}
              </div>
            )}
            {chatHistory.map((m, i) => (
              <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
                <div className={`max-w-[80%] px-4 py-2.5 rounded-2xl text-sm whitespace-pre-wrap
                  ${m.role === "user" ? "bg-gray-900 text-white" : "bg-gray-100 text-gray-900"}`}>
                  {m.content}
                </div>
              </div>
            ))}
            {loading && (
              <div className="flex justify-start">
                <div className="bg-gray-100 px-4 py-2.5 rounded-2xl text-sm text-gray-400">Digitando...</div>
              </div>
            )}
            <div ref={chatEnd} />
          </div>
          <div className="border-t border-gray-200 p-3 flex gap-2">
            <input value={chatInput} onChange={e => setChatInput(e.target.value)}
              onKeyDown={e => e.key === "Enter" && !e.shiftKey && sendMessage()}
              placeholder="Digite sua mensagem..." disabled={loading}
              className="flex-1 px-4 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-gray-400" />
            <button onClick={sendMessage} disabled={loading || !chatInput.trim()}
              className="px-4 py-2 bg-gray-900 text-white rounded-lg text-sm hover:bg-gray-800 disabled:opacity-40">
              <Send size={16} />
            </button>
          </div>
        </div>
      )}

      {/* Config Tab */}
      {tab === "config" && (
        <div className="space-y-5">
          <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
            <label className="text-sm font-medium block mb-2">System Prompt</label>
            <textarea value={editPrompt} onChange={e => setEditPrompt(e.target.value)} rows={8}
              className="w-full border border-gray-200 rounded-lg p-3 text-sm focus:outline-none focus:border-gray-400 resize-none" />
            <button onClick={savePrompt}
              className="mt-3 flex items-center gap-2 px-4 py-2 bg-gray-900 text-white rounded-lg text-sm hover:bg-gray-800">
              <Save size={14} /> Salvar prompt
            </button>
          </div>
          <div className="bg-white border border-gray-200 rounded-xl p-5 shadow-sm">
            <label className="text-sm font-medium block mb-2">Status do agente</label>
            <button onClick={() => setAgents(prev => ({ ...prev, [agentKey]: { ...prev[agentKey], ativo: !prev[agentKey].ativo } }))}
              className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm border ${
                agent.ativo ? "border-emerald-300 bg-emerald-50 text-emerald-700" : "border-red-300 bg-red-50 text-red-700"}`}>
              {agent.ativo ? <ToggleRight size={18} /> : <ToggleLeft size={18} />}
              {agent.ativo ? "Ativo" : "Inativo"}
            </button>
          </div>
        </div>
      )}

      {/* Integrations Tab */}
      {tab === "integ" && (
        <div className="space-y-3">
          {agentIntegrations.length === 0 && <div className="text-sm text-gray-400">Nenhuma integração vinculada a este agente.</div>}
          {agentIntegrations.map(ig => (
            <div key={ig.id} className="bg-white border border-gray-200 rounded-xl p-4 shadow-sm flex items-center gap-4">
              <span className="text-2xl">{ig.icon}</span>
              <div className="flex-1">
                <div className="font-medium text-sm">{ig.nome}</div>
                <div className="text-xs text-gray-500">{ig.tipo} · {ig.auth}</div>
              </div>
              <div className={`w-2 h-2 rounded-full ${statusDot(ig.status)}`} />
              <span className="text-xs text-gray-500">{ig.latencia ? `${ig.latencia}ms` : "—"}</span>
            </div>
          ))}
        </div>
      )}

      {/* Documents Tab */}
      {tab === "docs" && (
        <div className="space-y-4">
          <div className="bg-white border-2 border-dashed border-gray-300 rounded-xl p-8 text-center">
            <Upload size={32} className="mx-auto text-gray-400 mb-2" />
            <p className="text-sm text-gray-500">Arraste arquivos aqui ou clique para upload</p>
            <p className="text-xs text-gray-400 mt-1">PDF, DOCX, XLSX, CSV</p>
            <input type="file" className="hidden" id={`upload-${agentKey}`}
              onChange={e => { if (e.target.files[0]) setDocs(d => [...d, { name: e.target.files[0].name, size: e.target.files[0].size, date: new Date().toLocaleString("pt-BR") }]); }} />
            <label htmlFor={`upload-${agentKey}`}
              className="mt-3 inline-block px-4 py-2 bg-gray-900 text-white rounded-lg text-sm cursor-pointer hover:bg-gray-800">
              Selecionar arquivo
            </label>
          </div>
          {docs.length > 0 && (
            <div className="space-y-2">
              {docs.map((d, i) => (
                <div key={i} className="bg-white border border-gray-200 rounded-xl p-4 flex items-center gap-3 shadow-sm">
                  <FileText size={20} className="text-gray-400" />
                  <div className="flex-1">
                    <div className="text-sm font-medium">{d.name}</div>
                    <div className="text-xs text-gray-400">{d.date}</div>
                  </div>
                  <button onClick={() => setDocs(docs.filter((_, j) => j !== i))}
                    className="p-1 rounded hover:bg-gray-100 text-gray-400"><Trash2 size={16} /></button>
                </div>
              ))}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ─── QUICK CHAT ─────────────────────────────────────────
function QuickChatPanel({ agent, config, onClose }) {
  const [messages, setMessages] = useState([]);
  const [input, setInput] = useState("");
  const [loading, setLoading] = useState(false);
  const endRef = useRef(null);

  useEffect(() => { endRef.current?.scrollIntoView({ behavior: "smooth" }); }, [messages]);

  async function send() {
    if (!input.trim() || loading) return;
    const msg = input.trim();
    setInput("");
    setMessages(m => [...m, { role: "user", content: msg }]);
    setLoading(true);
    try {
      const key = config.anthropicKey;
      if (!key) {
        setMessages(m => [...m, { role: "assistant", content: "Configure a API key nas Configurações." }]);
        setLoading(false);
        return;
      }
      const res = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "x-api-key": key, "anthropic-version": "2023-06-01", "content-type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1024,
          system: agent.prompt,
          messages: [...messages.map(m => ({ role: m.role, content: m.content })), { role: "user", content: msg }]
        })
      });
      const data = await res.json();
      setMessages(m => [...m, { role: "assistant", content: data.content?.[0]?.text || "Erro." }]);
    } catch (e) {
      setMessages(m => [...m, { role: "assistant", content: `Erro: ${e.message}` }]);
    }
    setLoading(false);
  }

  return (
    <div className="fixed bottom-24 right-5 z-50 w-96 max-w-[calc(100vw-2rem)] bg-white border border-gray-200 rounded-2xl shadow-2xl flex flex-col"
      style={{ height: "480px" }}>
      <div className="flex items-center gap-2 px-4 py-3 border-b border-gray-200">
        <span className="text-xl">🎛</span>
        <span className="font-semibold text-sm">Chat Rápido — Orquestrador</span>
        <div className="flex-1" />
        <button onClick={onClose} className="p-1 rounded hover:bg-gray-100"><X size={16} /></button>
      </div>
      <div className="flex-1 overflow-y-auto p-4 space-y-3">
        {messages.length === 0 && <div className="text-center text-gray-400 text-xs pt-16">Envie uma mensagem para começar</div>}
        {messages.map((m, i) => (
          <div key={i} className={`flex ${m.role === "user" ? "justify-end" : "justify-start"}`}>
            <div className={`max-w-[85%] px-3 py-2 rounded-xl text-sm whitespace-pre-wrap
              ${m.role === "user" ? "bg-gray-900 text-white" : "bg-gray-100"}`}>
              {m.content}
            </div>
          </div>
        ))}
        {loading && <div className="flex justify-start"><div className="bg-gray-100 px-3 py-2 rounded-xl text-xs text-gray-400">...</div></div>}
        <div ref={endRef} />
      </div>
      <div className="border-t border-gray-200 p-3 flex gap-2">
        <input value={input} onChange={e => setInput(e.target.value)}
          onKeyDown={e => e.key === "Enter" && send()}
          placeholder="Mensagem..." disabled={loading}
          className="flex-1 px-3 py-2 rounded-lg border border-gray-200 text-sm focus:outline-none focus:border-gray-400" />
        <button onClick={send} disabled={loading || !input.trim()}
          className="px-3 py-2 bg-gray-900 text-white rounded-lg hover:bg-gray-800 disabled:opacity-40">
          <Send size={14} />
        </button>
      </div>
    </div>
  );
}
